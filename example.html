<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example Website with Rat Analytics</title>
    <!-- Rat Analytics Meta Tag (Option 1) -->
    <meta name="rat-analytics-project" content="YOUR_PROJECT_ID" />
  </head>
  <body>
    <h1>Welcome to My Website</h1>
    <p>This page includes Rat Analytics for tracking page views.</p>

    <!-- Alternative: Set project ID via JavaScript (Option 2) -->
    <!-- <script>window.ratAnalyticsProjectId = 'YOUR_PROJECT_ID';</script> -->

    <!-- RAT Analytics: Replace with your self-hosted RAT server URL -->
    <script src="https://your-rat-server.com/snippet/analytics.js"></script>
  </body>
</html>
