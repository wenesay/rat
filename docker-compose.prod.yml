version: '3.8'

services:
  rat-analytics:
    build: .
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - ./analytics.db:/app/analytics.db
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - DATABASE_PATH=${DATABASE_PATH:-/app/analytics.db}
    restart: unless-stopped
